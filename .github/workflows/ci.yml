name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Pinned to a toolchain that includes the stdlib security fixes govulncheck
# requires (see go.mod `toolchain`). Bump both together.
env:
  GO_VERSION: "1.26.5"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build · vet · test (race)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test (race + coverage)
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: warn

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Scan
        run: govulncheck ./...

  gosec:
    name: gosec (medium+)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # allow SARIF upload to code scanning (no-op without GHAS)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      # scripts/ holds the dev-only image builder; its inputs are operator paths,
      # not untrusted data. LOW findings (G104) are surfaced in logs but do not
      # fail the build; medium+ must be clean or annotated with a #nosec reason.
      - name: Scan
        run: gosec -severity medium -exclude-dir=scripts -fmt sarif -out gosec.sarif ./...
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: gosec.sarif

  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
      - name: Install cyclonedx-gomod
        run: go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@latest
      - name: Generate SBOM
        run: cyclonedx-gomod app -json -output sbom.cdx.json -main cmd/postra .
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.cdx.json

  docker:
    name: docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t postra:ci .
