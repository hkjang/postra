{{define "layout"}}<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{block "title" .}}Postra{{end}} · Postra</title>
<link rel="icon" type="image/png" href="/ui/static/favicon.png">
<link rel="shortcut icon" href="/favicon.ico">
<style>
:root{--bg:#f3f6fa;--fg:#172033;--muted:#667085;--line:#dfe5ee;--accent:#3157d5;--accent-2:#203c9b;--accent-soft:#eef2ff;--warn:#b45309;--danger:#b42318;--card:#fff;--shadow:0 1px 2px rgba(16,24,40,.04),0 8px 24px rgba(16,24,40,.06)}
@media(prefers-color-scheme:dark){:root{--bg:#10141c;--fg:#eef2f8;--muted:#98a2b3;--line:#293241;--accent:#7c9cff;--accent-2:#a9baff;--accent-soft:#1c294d;--warn:#f0b45b;--danger:#ff7a70;--card:#171d27;--shadow:0 10px 30px rgba(0,0,0,.18)}}
*{box-sizing:border-box}
body{margin:0;font:15px/1.55 Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:var(--bg);color:var(--fg);letter-spacing:-.01em}
.app-header{height:64px;background:color-mix(in srgb,var(--card) 94%,transparent);border-bottom:1px solid var(--line);padding:0 max(1.25rem,calc((100vw - 1180px)/2));display:flex;gap:2rem;align-items:center;position:sticky;top:0;z-index:20;backdrop-filter:blur(14px)}
header a{color:var(--fg);text-decoration:none;font-weight:650}
header .brand{color:var(--fg);font-size:1.08rem;display:flex;align-items:center;gap:.65rem;letter-spacing:-.02em}
.brand-mark{width:31px;height:31px;border-radius:9px;background:linear-gradient(145deg,var(--accent),var(--accent-2));color:#fff;display:grid;place-items:center;box-shadow:0 6px 14px rgba(49,87,213,.25)}
.brand-mark-img{width:31px;height:31px;border-radius:8px;object-fit:cover;box-shadow:0 4px 12px rgba(49,87,213,.25)}
header nav{display:flex;gap:.25rem;font-weight:560;height:100%;align-items:center}
header nav a{color:var(--muted);padding:.55rem .75rem;border-radius:8px;transition:.16s ease}
header nav a:hover{color:var(--accent);background:var(--accent-soft)}
.header-logout{margin-left:auto}.header-logout button{padding:.45rem .75rem}
main{max-width:1180px;margin:2rem auto;padding:0 1.5rem}
.auth-main{max-width:none;margin:0;padding:0;min-height:100vh}
h1{font-size:1.65rem;line-height:1.25;letter-spacing:-.035em;margin:.15rem 0 1.25rem}
h2{font-size:1.08rem;letter-spacing:-.02em;margin:1.5rem 0 .65rem}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:1.25rem 1.4rem;margin-bottom:1rem;box-shadow:var(--shadow)}
table{width:100%;border-collapse:collapse}
th,td{text-align:left;padding:.72rem .6rem;border-bottom:1px solid var(--line);vertical-align:top}
th{color:var(--muted);font-weight:600;font-size:.82rem;text-transform:uppercase;letter-spacing:.03em}
td.subj a{color:var(--accent);text-decoration:none;font-weight:500}
.muted{color:var(--muted)}
.small{font-size:.85rem}
form.search{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem}
input[type=text],input[type=password],textarea{background:var(--card);border:1px solid #cdd5df;border-radius:9px;padding:.65rem .75rem;color:var(--fg);font:inherit;outline:none;transition:.16s ease}
input[type=email],input[type=number],select{background:var(--card);border:1px solid #cdd5df;border-radius:9px;padding:.65rem .75rem;color:var(--fg);font:inherit;outline:none}
input:focus,textarea:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 16%,transparent)}
input[type=text]{flex:1;min-width:200px}
textarea{width:100%;min-height:9rem;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
button,.btn{background:linear-gradient(180deg,var(--accent),var(--accent-2));color:#fff;border:0;border-radius:99px;padding:.62rem 1rem;font:inherit;font-weight:650;cursor:pointer;text-decoration:none;display:inline-block;box-shadow:0 1px 2px rgba(16,24,40,.12);transition:transform .12s ease,box-shadow .12s ease}
button:hover,.btn:hover{transform:translateY(-1px);box-shadow:0 5px 14px rgba(32,60,155,.18)}
button.danger,.btn.danger{background:var(--danger)}
button.ghost,.btn.ghost{background:var(--card);color:var(--accent);border:1px solid var(--line);box-shadow:none}
.pre{white-space:pre-wrap;word-break:break-word;background:var(--bg);border:1px solid var(--line);border-radius:7px;padding:.8rem;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.9rem}
.kv{display:grid;grid-template-columns:110px 1fr;gap:.35rem .8rem;margin:.3rem 0}
.kv dt{color:var(--muted)}
.kv dd{margin:0}
.warn{background:color-mix(in srgb,var(--warn) 10%,var(--card));border:1px solid color-mix(in srgb,var(--warn) 45%,var(--line));color:var(--warn);border-radius:9px;padding:.7rem .85rem;margin:.6rem 0}
.tag{display:inline-block;font-size:.72rem;padding:.1rem .45rem;border-radius:5px;border:1px solid var(--line);color:var(--muted);margin-left:.3rem}
.err{color:var(--danger);font-weight:500}
.actions{display:flex;gap:.65rem;margin-top:1rem;align-items:center;flex-wrap:wrap}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1rem}
.field{display:flex;flex-direction:column;gap:.25rem;margin-bottom:.8rem}
.field label{font-size:.82rem;color:var(--muted);font-weight:600}
.field input,.field select{width:100%}
.ok{color:#15803d;font-weight:600}
.status-failed,.status-credential_error{color:var(--danger);font-weight:600}
.empty{text-align:center;padding:2rem 1rem}
.json{white-space:pre-wrap;word-break:break-word}
.auth-shell{min-height:100vh;display:grid;grid-template-columns:minmax(360px,560px) 1fr;background:var(--card)}
.auth-panel{display:flex;flex-direction:column;padding:clamp(2rem,6vw,5.5rem);justify-content:center;position:relative}
.auth-brand{position:absolute;top:2rem;left:clamp(2rem,6vw,5.5rem);display:flex;align-items:center;gap:.7rem;font-size:1.1rem;font-weight:750}
.auth-brand .brand-mark{width:36px;height:36px}
.auth-brand img{width:36px;height:36px;border-radius:9px;object-fit:cover;box-shadow:0 4px 12px rgba(49,87,213,.25)}
.auth-card{width:100%;max-width:410px;margin:auto}
.auth-card h1{font-size:2rem;margin-bottom:.55rem}.auth-card>.muted{margin:0 0 1.8rem}
.auth-card .field{margin-bottom:1rem}.auth-card .field label{font-size:.88rem;color:var(--fg)}
.auth-card input{height:46px}.auth-submit{width:100%;height:46px;margin-top:.35rem}
.auth-divider{display:flex;align-items:center;gap:.8rem;color:var(--muted);font-size:.78rem;margin:1.35rem 0}
.auth-divider:before,.auth-divider:after{content:"";height:1px;background:var(--line);flex:1}
.sso-button{width:100%;text-align:center;height:46px}
.auth-visual{position:relative;overflow:hidden;background:linear-gradient(145deg,#172554 0%,#243b8f 45%,#3157d5 100%);color:#fff;padding:clamp(3rem,7vw,7rem);display:flex;align-items:flex-end}
.auth-visual:before,.auth-visual:after{content:"";position:absolute;border-radius:999px;border:1px solid rgba(255,255,255,.16)}
.auth-visual:before{width:560px;height:560px;right:-120px;top:-160px}.auth-visual:after{width:360px;height:360px;left:-100px;bottom:-150px}
.auth-message{position:relative;z-index:1;max-width:590px}.auth-message .eyebrow{font-size:.78rem;text-transform:uppercase;letter-spacing:.14em;opacity:.7;font-weight:700}
.auth-message h2{font-size:clamp(2rem,4vw,3.8rem);line-height:1.1;letter-spacing:-.045em;margin:.9rem 0 1.2rem}.auth-message p{font-size:1.05rem;line-height:1.7;opacity:.78;max-width:520px}
.auth-features{display:flex;gap:1rem;flex-wrap:wrap;margin-top:2rem}.auth-feature{border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);padding:.6rem .8rem;border-radius:9px;font-size:.85rem;backdrop-filter:blur(8px)}
@media(max-width:820px){.auth-shell{grid-template-columns:1fr}.auth-visual{display:none}.auth-panel{min-height:100vh;padding:5.5rem 1.5rem 2rem}.auth-brand{left:1.5rem}.app-header{padding:0 1rem;gap:.75rem}.app-header nav{overflow:auto}.app-header nav a{white-space:nowrap;padding:.45rem}.header-logout{display:none}main{padding:0 1rem}}
</style>
</head>
<body>
{{if not .AuthPage}}<header class="app-header">
  <a href="/ui/" class="brand"><img src="/ui/static/logo.png" alt="Postra Logo" class="brand-mark-img"><span>Postra</span><span class="tag">v{{.Version}}</span></a>
  <nav>
    <a href="/ui/">받은편지함</a>
    <a href="/ui/compose">새 메일</a>
    <a href="/ui/accounts">계정</a>
    <a href="/ui/mcp-keys">MCP Key</a>
    <a href="/ui/admin/ai">AI</a>
    <a href="/ui/admin/users">관리</a>
    <a href="/ui/admin/incidents">오류/장애</a>
  </nav>
  <div id="live-sync-badge" style="display:none;margin-left:auto;margin-right:1rem;font-size:0.825rem;align-items:center;gap:0.4rem;padding:0.2rem 0.6rem;background:rgba(59,130,246,0.1);border:1px solid var(--accent,#3b82f6);border-radius:1rem;color:var(--accent,#3b82f6)">
    <span>🔄</span>
    <span id="live-sync-text">동기화 진행 중...</span>
  </div>
  <form method="post" action="/ui/logout" class="header-logout">
    <button type="submit" class="ghost">로그아웃</button>
  </form>
</header>{{end}}
<main{{if .AuthPage}} class="auth-main"{{end}}>
{{block "content" .}}{{end}}
</main>
{{if not .AuthPage}}
<footer style="max-width:1180px;margin:3rem auto 2rem;padding:1rem 1.5rem;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center" class="small muted">
  <div>Postra Mail Platform · <b>v{{.Version}}</b></div>
  <div><a href="/ui/mcp-keys" class="muted" style="text-decoration:none;margin-right:1rem">MCP Key 관리</a><a href="/ui/admin/settings" class="muted" style="text-decoration:none">시스템 설정</a></div>
</footer>
<script>
(function() {
  function checkSyncStatus() {
    fetch('/ui/jobs/status').then(function(r){ return r.json(); }).then(function(d) {
      var badge = document.getElementById('live-sync-badge');
      var text = document.getElementById('live-sync-text');
      if (!badge || !text) return;
      if (d.has_active && d.active_jobs && d.active_jobs.length > 0) {
        var job = d.active_jobs[0];
        badge.style.display = 'inline-flex';
        text.innerText = '동기화 진행 중 (' + (job.progress || '수집 중') + ')';
      } else {
        badge.style.display = 'none';
      }
    }).catch(function(){});
  }
  checkSyncStatus();
  setInterval(checkSyncStatus, 4000);

  // Global Keyboard Shortcuts (§P2 키보드 단축키)
  document.addEventListener('keydown', function(e) {
    if (['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) return;
    if (e.ctrlKey || e.metaKey || e.altKey) return;

    if (e.key === '/') {
      var searchInput = document.querySelector('input[name="q"], input[type="search"]');
      if (searchInput) {
        e.preventDefault();
        searchInput.focus();
      }
    } else if (e.key === 'c') {
      e.preventDefault();
      window.location.href = '/ui/compose';
    } else if (e.key === 'j' || e.key === 'k') {
      var rows = Array.from(document.querySelectorAll('tr.msg-row, .message-card'));
      if (rows.length === 0) return;
      var activeIndex = rows.findIndex(r => r.classList.contains('focused-row'));
      if (activeIndex !== -1) rows[activeIndex].classList.remove('focused-row');
      if (e.key === 'j') activeIndex = Math.min(rows.length - 1, activeIndex + 1);
      if (e.key === 'k') activeIndex = Math.max(0, activeIndex - 1);
      if (activeIndex >= 0 && rows[activeIndex]) {
        rows[activeIndex].classList.add('focused-row');
        rows[activeIndex].scrollIntoView({ block: 'nearest' });
      }
    }
  });
})();
</script>
{{end}}
</body>
</html>{{end}}
